<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDP AI 에이전트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; display: flex; height: 100vh; overflow: hidden; }

  /* 왼쪽 메뉴바 */
  #sidebar {
    width: 180px;
    min-width: 180px;
    background: #1e2027;
    color: #ccc;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    z-index: 100;
  }
  #sidebar-title {
    padding: 16px 12px 10px;
    font-size: 12px;
    font-weight: bold;
    color: #ff3c34;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #333;
  }
  #sidebar-title span { font-size: 10px; color: #666; display: block; margin-top: 2px; }
  .sidebar-section { padding: 10px 0; border-bottom: 1px solid #2a2d35; }
  .sidebar-section-title {
    font-size: 10px;
    color: #555;
    padding: 0 12px 6px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .sidebar-menu-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .sidebar-menu-item:hover { background: #2a2d35; color: #fff; }
  .sidebar-menu-item.active { background: #2a2d35; color: #fff; border-left-color: #ff3c34; }
  .sidebar-lab-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px 6px 28px;
    font-size: 11px;
    color: #777;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-lab-item:hover { background: #2a2d35; color: #ddd; }
  .sidebar-lab-item::before { content: '●'; color: #ff3c34; font-size: 7px; margin-right: 2px; }
  .sidebar-saved-item {
    padding: 6px 12px 6px 24px;
    font-size: 11px;
    color: #888;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-saved-item:hover { background: #2a2d35; color: #fff; }
  .sidebar-saved-item .dot { width: 5px; height: 5px; border-radius: 50%; background: #ff3c34; flex-shrink: 0; }

  /* 가운데 PDP 패널 */
  #pdp-panel {
    width: 375px;
    min-width: 375px;
    background: #fff;
    overflow-y: auto;
    border-right: 1px solid #ddd;
    border-left: 1px solid #ddd;
    position: relative;
  }
  #pdp-title {
    position: sticky;
    top: 0;
    background: #ff3c34;
    color: white;
    text-align: center;
    padding: 10px;
    font-size: 13px;
    font-weight: bold;
    z-index: 10;
  }
  #pdp-modules {
    padding-bottom: 80px;
  }

  /* 모듈 블록 */
  .module-block {
    position: relative;
    cursor: grab;
  }
  .module-block:active { cursor: grabbing; }
  .module-block.dragging { opacity: 0.4; }
  .module-block.drag-over { border-top: 3px solid #ff3c34; }

  .module-block img {
    width: 100%;
    display: block;
  }

  /* 모듈 오버레이 컨트롤 */
  .module-overlay {
    position: absolute;
    top: 4px;
    right: 4px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 5;
  }
  .module-block:hover .module-overlay { opacity: 1; }
  .module-overlay button {
    background: rgba(0,0,0,0.65);
    color: white;
    border: none;
    border-radius: 4px;
    padding: 3px 7px;
    font-size: 11px;
    cursor: pointer;
  }
  .module-overlay button:hover { background: #ff3c34; }

  /* 모듈 라벨 */
  .module-label {
    position: absolute;
    top: 4px;
    left: 4px;
    background: rgba(0,0,0,0.55);
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .module-block:hover .module-label { opacity: 1; }

  /* 오른쪽 콘텐츠 패널 */
  #content-panel {
    flex: 1;
    overflow-y: auto;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
  }
  .panel-view { display: none; flex: 1; flex-direction: column; }
  .panel-view.active { display: flex; }
  .panel-header {
    padding: 14px 16px;
    background: white;
    border-bottom: 1px solid #ddd;
    font-size: 13px;
    font-weight: bold;
    color: #333;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-body { flex: 1; overflow-y: auto; padding: 16px; }

  /* 소스 모듈 카드 */
  .source-card {
    background: white;
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
    border: 1px solid #ddd;
    transition: box-shadow 0.2s;
  }
  .source-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .source-card .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    background: #fafafa;
    border-bottom: 1px solid #eee;
  }
  .source-card .card-name {
    font-size: 12px;
    font-weight: bold;
    color: #333;
  }
  .source-card .card-actions {
    display: flex;
    gap: 4px;
  }
  .btn-insert {
    background: #ff3c34;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-insert:hover { background: #cc0000; }
  .btn-toggle {
    background: #eee;
    color: #333;
    border: none;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    cursor: pointer;
  }
  .source-card img {
    width: 100%;
    display: block;
    max-height: 120px;
    object-fit: cover;
    object-position: top;
  }
  .source-card.active .card-header { background: #fff0f0; border-left: 3px solid #ff3c34; }

  /* 하단 고정 바 */
  #bottom-bar {
    position: sticky;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 20;
    line-height: 0;
  }
  #bottom-bar img {
    width: 100%;
    display: block;
  }

  /* 빈 상태 */
  #pdp-empty {
    text-align: center;
    padding: 40px 20px;
    color: #aaa;
    font-size: 13px;
    display: none;
  }
</style>
</head>
<body>

<!-- 왼쪽 메뉴바 -->
<div id="sidebar">
  <div id="sidebar-title">
    PDP AI 에이전트
  </div>
  <div class="sidebar-section">
    <div class="sidebar-menu-item active" onclick="switchPanel('order')" id="menu-order">
      <span class="icon">📋</span> 통합 PDP
    </div>
    <div id="sidebar-lab-list"></div>
  </div>
</div>

<!-- 가운데 PDP 미리보기 -->
<div id="pdp-panel">
  
  <div id="pdp-modules"></div>
  <div id="pdp-empty">모듈을 삽입하세요</div>
  <div id="bottom-bar">
    <img src="images/img_01.png" alt="하단버튼">
  </div>
</div>

<!-- 오른쪽 콘텐츠 패널 -->
<div id="content-panel">

  <!-- 순서 보기 패널 -->
  <div class="panel-view active" id="panel-order">
    <div class="panel-header" style="justify-content:space-between;">
      <span>📋 통합 PDP</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <button onclick="showAll()" style="background:#f0f0f0;color:#555;border:none;border-radius:6px;padding:6px 10px;font-size:11px;cursor:pointer;">👁️ 전체표시</button>
        <button onclick="hideAll()" style="background:#f0f0f0;color:#555;border:none;border-radius:6px;padding:6px 10px;font-size:11px;cursor:pointer;">🙈 전체숨기기</button>
        <button onclick="resetAll()" style="background:#f0f0f0;color:#555;border:none;border-radius:6px;padding:6px 10px;font-size:11px;cursor:pointer;">↺ 초기화</button>
        <button onclick="openSaveModal()" style="background:#ff3c34;color:white;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:bold;cursor:pointer;">💾 저장</button>
      </div>
    </div>
    <div class="panel-body">
      <div id="order-list"></div>
    </div>
  </div>

  <!-- 저장 모달 -->
  <div id="save-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:white;border-radius:12px;padding:24px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <div style="font-size:15px;font-weight:bold;color:#333;margin-bottom:16px;">💾 버전 이름을 입력하세요</div>
      <input id="save-name-input" type="text" placeholder="예) 광고 없는 버전, 리뷰 강조 버전..." style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;margin-bottom:16px;">
      <div style="display:flex;gap:8px;">
        <button onclick="closeSaveModal()" style="flex:1;padding:10px;border:1px solid #ddd;background:white;border-radius:8px;font-size:13px;cursor:pointer;color:#666;">취소</button>
        <button onclick="saveVersion()" style="flex:1;padding:10px;border:none;background:#ff3c34;color:white;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;">저장</button>
      </div>
    </div>
  </div>


</div>

<script>
const ALL_MODULES = [
  { id: "0_header", name: "헤더", src: "images/img_02.png" },
  { id: "1_top_ad", name: "광고) 최상단 광고", src: "images/img_03.png" },
  { id: "2_product_image", name: "상품 대표 이미지", src: "images/img_04.png" },
  { id: "3_shocking_deal", name: "쇼킹딜 타이머", src: "images/img_05.png" },
  { id: "4_badge_rating", name: "베스트 뱃지 + 평점/리뷰수", src: "images/img_06.png" },
  { id: "5_brand_name", name: "브랜드명 + 상품명", src: "images/img_07.png" },
  { id: "6_group_option", name: "그룹상품 / 옵션", src: "images/img_08.png" },
  { id: "7_price", name: "가격", src: "images/img_09.png" },
  { id: "8_point", name: "적립", src: "images/img_10.png" },
  { id: "9_benefit", name: "혜택", src: "images/img_11.png" },
  { id: "10_delivery", name: "배송 정보", src: "images/img_12.png" },
  { id: "11_wish_share", name: "찜 + 공유", src: "images/img_13.png" },
  { id: "12_band_ad", name: "띠배너 광고", src: "images/img_14.png" },
  { id: "13_related_ad", name: "광고) 다른 고객이 많이 본 연관상품", src: "images/img_15.png" },
  { id: "14_compare_ad", name: "광고) 이런 상품도 비교해보세요", src: "images/img_16.png" },
  { id: "15_review_satisfy", name: "구매 만족 리뷰", src: "images/img_17.png" },
  { id: "16_seller_info", name: "판매자 정보", src: "images/img_18.png" },
  { id: "17_band_ad2", name: "띠배너 광고", src: "images/img_19.png" },
  { id: "18_coupon", name: "할인쿠폰", src: "images/img_20.png" },
  { id: "19_product_desc_tab", name: "상품설명탭", src: "images/img_21.png" },
  { id: "20_group_product", name: "그룹상품", src: "images/img_22.png" },
  { id: "21_product_info", name: "상품 판매/고시 정보", src: "images/img_23.png" },
  { id: "22_review_summary", name: "리뷰 요약", src: "images/img_24.png" },
  { id: "23_review_list", name: "리뷰 목록", src: "images/img_25.png" },
  { id: "24_review_ad", name: "광고) 4점 이상 리뷰 좋은 상품", src: "images/img_26.png" },
  { id: "25_shopping_suggest", name: "광고) 쇼핑제안", src: "images/img_27.png" },
  { id: "26_together_ad", name: "광고) 이 상품과 함께 볼만한 상품", src: "images/img_28.png" },
  { id: "26b_together_ad_ext", name: "광고) 이 상품과 함께 볼만한 상품 (연장)", src: "images/img_29.png" },
  { id: "28_seller_popular", name: "판매자 정보 + 판매자 인기상품", src: "images/img_30.png" },
  { id: "29_footer", name: "앱 다운로드 + 푸터", src: "images/img_31.png" },
];

// 현재 PDP에 표시 중인 모듈 순서
let pdpOrder = ALL_MODULES.map(m => m.id);
let hiddenModules = new Set();

let dragSrcId = null;

function renderPDP() {
  const container = document.getElementById('pdp-modules');
  container.innerHTML = '';
  const visible = pdpOrder.filter(id => !hiddenModules.has(id));
  
  if (visible.length === 0) {
    document.getElementById('pdp-empty').style.display = 'block';
  } else {
    document.getElementById('pdp-empty').style.display = 'none';
  }

  visible.forEach(id => {
    const mod = ALL_MODULES.find(m => m.id === id);
    if (!mod) return;

    const block = document.createElement('div');
    block.className = 'module-block';
    block.draggable = true;
    block.dataset.id = id;

    block.innerHTML = `
      <div class="module-label">${mod.name}</div>
      <img src="${mod.src}" alt="${mod.name}" loading="lazy">
      <div class="module-overlay">
        <button onclick="moveModule('${id}', -1)">▲</button>
        <button onclick="moveModule('${id}', 1)">▼</button>
        <button onclick="removeFromPDP('${id}')">✕</button>
      </div>
    `;

    block.addEventListener('dragstart', e => {
      dragSrcId = id;
      block.classList.add('dragging');
    });
    block.addEventListener('dragend', () => block.classList.remove('dragging'));
    block.addEventListener('dragover', e => {
      e.preventDefault();
      block.classList.add('drag-over');
    });
    block.addEventListener('dragleave', () => block.classList.remove('drag-over'));
    block.addEventListener('drop', e => {
      e.preventDefault();
      block.classList.remove('drag-over');
      if (dragSrcId && dragSrcId !== id) {
        const srcIdx = pdpOrder.indexOf(dragSrcId);
        const tgtIdx = pdpOrder.indexOf(id);
        pdpOrder.splice(srcIdx, 1);
        pdpOrder.splice(tgtIdx, 0, dragSrcId);
        renderPDP();
        renderOrderList();
      }
    });

    container.appendChild(block);
  });
}



function toggleModule(id) {
  if (hiddenModules.has(id)) {
    hiddenModules.delete(id);
  } else {
    hiddenModules.add(id);
  }
  renderPDP();
  renderOrderList();
}

function insertModule(id) {
  hiddenModules.delete(id);
  if (!pdpOrder.includes(id)) {
    pdpOrder.push(id);
  }
  renderPDP();
  renderOrderList();
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function removeFromPDP(id) {
  hiddenModules.add(id);
  renderPDP();
  renderOrderList();
}

function moveModule(id, dir) {
  const visibleIds = pdpOrder.filter(i => !hiddenModules.has(i));
  const visIdx = visibleIds.indexOf(id);
  const newVisIdx = visIdx + dir;
  if (newVisIdx < 0 || newVisIdx >= visibleIds.length) return;

  const swapId = visibleIds[newVisIdx];
  const aIdx = pdpOrder.indexOf(id);
  const bIdx = pdpOrder.indexOf(swapId);
  [pdpOrder[aIdx], pdpOrder[bIdx]] = [pdpOrder[bIdx], pdpOrder[aIdx]];
  renderPDP();
}

// 초기 렌더
renderPDP();
renderOrderList();

// 저장된 버전 목록
let savedVersions = [];

function openSaveModal() {
  const now = new Date();
  const defaultName = `버전 ${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('save-name-input').value = defaultName;
  document.getElementById('save-memo-input').value = '';
  document.getElementById('save-modal').style.display = 'flex';
}

function closeSaveModal() {
  document.getElementById('save-modal').style.display = 'none';
}

function saveVersion() {
  const name = document.getElementById('save-name-input').value.trim() || '이름 없음';
  const version = {
    id: Date.now(),
    name,
    pdpOrder: [...pdpOrder],
    hiddenModules: [...hiddenModules],
    savedAt: new Date().toLocaleString('ko-KR')
  };
  savedVersions.unshift(version);
  closeSaveModal();
  renderLabList();
}

function loadVersion(id) {
  const v = savedVersions.find(v => v.id === id);
  if (!v) return;
  pdpOrder = [...v.pdpOrder];
  hiddenModules = new Set(v.hiddenModules);
  renderPDP();
  renderOrderList();
}

function deleteVersion(id) {
  savedVersions = savedVersions.filter(v => v.id !== id);
  renderLabList();
}

function renderLabList() {
  const sidebarList = document.getElementById('sidebar-lab-list');
  if (sidebarList) {
    sidebarList.innerHTML = savedVersions.map(v => `
      <div class="sidebar-lab-item" onclick="loadVersion(${v.id})" title="${v.name}">
        ${v.name}
      </div>
    `).join('');
  }
}

function switchPanel(name) {
  document.querySelectorAll('.panel-view').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-menu-item').forEach(m => m.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('menu-' + name).classList.add('active');
  if (name === 'order') renderOrderList();
}

function resetAll() {
  pdpOrder = ALL_MODULES.map(m => m.id);
  hiddenModules = new Set();
  renderPDP();
  renderOrderList();
}

function hideAll() {
  ALL_MODULES.forEach(m => hiddenModules.add(m.id));
  renderPDP();
  renderOrderList();
}

function showAll() {
  hiddenModules = new Set();
  renderPDP();
  renderOrderList();
}

function renderOrderList() {
  const container = document.getElementById('order-list');
  if (!container) return;
  container.innerHTML = '';
  pdpOrder.forEach((id, idx) => {
    const mod = ALL_MODULES.find(m => m.id === id);
    if (!mod) return;
    const isHidden = hiddenModules.has(id);
    const item = document.createElement('div');
    item.style.cssText = `display:flex;align-items:center;gap:10px;padding:8px 12px;background:${isHidden ? '#fafafa' : 'white'};border-radius:8px;margin-bottom:6px;border:1px solid ${isHidden ? '#eee' : '#ddd'};opacity:${isHidden ? '0.5' : '1'};`;
    item.innerHTML = `
      <span style="color:#bbb;min-width:16px;font-size:11px;">${idx + 1}</span>
      <span style="flex:1;font-size:12px;color:${isHidden ? '#aaa' : '#333'};">${mod.name}</span>
      <img src="${mod.src}" style="width:48px;height:36px;object-fit:cover;object-position:top;border-radius:4px;border:1px solid #eee;flex-shrink:0;">
      <div style="display:flex;flex-direction:column;gap:3px;">
        <button onclick="moveModule('${id}',-1);renderOrderList();" style="border:none;background:#f0f0f0;border-radius:3px;padding:2px 7px;cursor:pointer;font-size:11px;">▲</button>
        <button onclick="moveModule('${id}',1);renderOrderList();" style="border:none;background:#f0f0f0;border-radius:3px;padding:2px 7px;cursor:pointer;font-size:11px;">▼</button>
      </div>
      <button onclick="toggleModule('${id}')" style="border:none;border-radius:5px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:bold;background:${isHidden ? '#eee' : '#fff0f0'};color:${isHidden ? '#666' : '#ff3c34'};border:1px solid ${isHidden ? '#ddd' : '#ffcccc'};">
        ${isHidden ? '숨김' : '노출'}
      </button>
    `;
    container.appendChild(item);
  });
}
</script>
</body>
</html>
